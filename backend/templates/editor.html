<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>magic markdown — editor</title>
  <style>
    :root { --slate-border: #c0c0c0; }
    html, body { margin: 0; min-height: 100%; background: #000; color: #fff; font-family: Georgia, serif; }
    #bar { position: fixed; top: 0; left: 0; right: 0; height: 30px; display: flex; gap: 12px; align-items: center;
           padding: 0 12px; font: 11px monospace; color: #6b7280; border-bottom: 1px solid rgba(192,192,192,0.15); z-index: 5; }
    /* the 3D Real register sits behind the floating panels (the only filled colour in the app) */
    #projector { position: fixed; inset: 0; width: 100vw; height: 100vh; z-index: 0; display: block; }
    #grid { position: relative; z-index: 2; display: flex; flex-wrap: wrap; gap: 18px; padding: 46px 18px 18px; align-items: flex-start; }
    .mm-slate, .mm-graph { font-size: 13px; }
    .mm-line { line-height: 1.55; }
    .mm-drop { cursor: pointer; color: var(--slate-border); margin-right: 4px; user-select: none; }
    .ws-on { color: #9ae6b4; } .ws-off { color: #c0414a; }
    /* §T black slate — the Milkdown click-to-edit surface (?slate=milkdown) */
    .mm-edit-host { background: #000; color: #fff; border: 1px solid var(--slate-border);
                    font-family: Georgia, 'Times New Roman', serif; font-size: 13px;
                    border-radius: 6px; padding: 8px 10px; min-width: 220px; }
    .mm-edit-host .mm-milkdown { outline: none; }
    .mm-edit-host .mm-milkdown p { margin: 3px 0; }
    .mm-edit-host .mm-milkdown ul { margin: 3px 0; padding-left: 18px; }
    .mm-edit-host .mm-ref-fold { cursor: pointer; color: var(--slate-border); user-select: none; }
    /* §3 {-autocomplete over concept names (EDIT-02) */
    .mm-autocomplete { position: fixed; z-index: 50; background: #000; border: 1px solid var(--slate-border);
                       font-family: Georgia, serif; font-size: 12px; min-width: 160px; max-height: 200px; overflow: auto; }
    .mm-ac-item { padding: 3px 8px; color: #fff; cursor: pointer; white-space: nowrap; }
    .mm-ac-item.sel, .mm-ac-item:hover { background: rgba(192,192,192,0.22); }
  </style>
</head>
<body>
  <canvas id="projector"></canvas>
  <div id="bar"><span id="count">…</span><span id="ws" class="ws-off">ws ○</span><span id="proj">3d ○</span><span id="hint">double-click a panel → graph ⇄ panel · click ▸ → expand link</span></div>
  <div id="grid"></div>
  <!-- THREE r128 (same as the legacy projector) for the 3D Real register -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
  <script type="module">
    import { createStore } from "/static/js/fe/store.mjs";
    import { GestureGateway } from "/static/js/fe/gateway.mjs";
    import { mount } from "/static/js/fe/magic_markdown_panel.mjs";
    import { haloVDom } from "/static/js/fe/magic_markdown_halo.mjs";
    import { createProjector } from "/static/js/fe/projector.mjs";
    import { renderPanel } from "/static/js/fe/magic_markdown.mjs";
    // The Milkdown editable layer is opt-in via ?slate=milkdown (docs/MILKDOWN_SLATE_GOAL.md).
    // The default served editor is unchanged; the bundle loads lazily only when flagged.
    const SLATE_EDITOR = new URLSearchParams(location.search).get("slate") || "custom";
    let mountMilkdown = null, markdownToFieldText = null, linesToMarkdown = null;
    if (SLATE_EDITOR === "milkdown") {
      const m = await import("/static/js/fe/vendor/milkdown_slate.bundle.mjs");
      mountMilkdown = m.mountMilkdown; markdownToFieldText = m.markdownToFieldText; linesToMarkdown = m.linesToMarkdown;
    }

    const WSID = "_default";
    const store = createStore();
    const gateway = new (function(){ return GestureGateway(store, { base: "" }); })();
    const grid = document.getElementById("grid");
    const ui = { expanded: {}, mode: {} };       // per-card render state (cardId → Set / 'panel'|'graph')

    // ── apparition halo (§V.4) ───────────────────────────────────────────────
    const SVG_NS = "http://www.w3.org/2000/svg";
    const SVG_TAGS = new Set(["svg", "line", "circle", "g", "path"]);
    function realiseHalo(spec) {
      const n = SVG_TAGS.has(spec.tag) ? document.createElementNS(SVG_NS, spec.tag) : document.createElement(spec.tag);
      for (const [k, v] of Object.entries(spec.attrs || {})) n.setAttribute(k, v);
      if (spec.text != null) n.textContent = spec.text;
      for (const c of spec.children || []) n.appendChild(realiseHalo(c));
      return n;
    }
    const haloHost = document.createElement("div"); document.body.appendChild(haloHost);
    let halo = null;  // { lineEl, candidates, camAngle }
    function focalCentre() {
      const r = halo.lineEl.getBoundingClientRect();
      return { cx: r.left + r.width / 2, cy: r.top + r.height / 2 };
    }
    function renderHalo() {
      haloHost.innerHTML = "";
      if (!halo || !halo.candidates.length) return;
      haloHost.appendChild(realiseHalo(haloVDom(focalCentre(), halo.candidates, { camAngle: halo.camAngle })));
    }
    function storeCandidates(excludeLine) {
      // instant candidates from the loaded workspace (no fetch) so the halo
      // appears immediately; refined by real retrieval async below.
      const ids = Object.keys(store.getState().concepts).slice(0, 8);
      return ids.map((id, i) => {
        const n = store.node(id);
        const label = ((n.children[0] && n.children[0].text) || n.text || id);
        return { id, label: String(label).slice(0, 24), similarity: 1 - i / Math.max(1, ids.length) };
      });
    }
    async function openHalo(lineEl) {
      // 1) render instantly from the store (responsive — never blocks on retrieval)
      halo = { lineEl, candidates: storeCandidates(lineEl), camAngle: 0 };
      renderHalo();
      // 2) refine with real triple-product retrieval (radiation) async
      try {
        const q = (lineEl.textContent || "").replace(/[▸▾]\s*/, "").trim();
        const res = await (await fetch(`/api/radiation`, { method: "POST", headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ text: q, workspace_id: WSID, k: 8 }) })).json();
        const cs = res.candidates || [];
        if (cs.length && halo && halo.lineEl === lineEl) {
          const smax = Math.max(1e-9, ...cs.map(c => c.score || 0));
          halo.candidates = cs.map(c => ({
            id: c.card_id || c.id || c.concept_id,
            label: String(c.name || c.card_id || "?").slice(0, 28),
            similarity: (c.transport && typeof c.transport.similarity === "number") ? c.transport.similarity : (c.score || 0) / smax,
          }));
          renderHalo();
        }
      } catch (e) { /* retrieval optional — instant halo already shown */ }
    }
    window.addEventListener("scroll", () => { if (halo) renderHalo(); }, true);   // T.4 fix #2: re-anchor on scroll
    window.__mm_open_halo = () => { const l = grid.querySelector(".mm-line"); if (l) openHalo(l); };
    window.__mm_halo_rotate = (d) => { if (halo) { halo.camAngle += (d || 0.6); renderHalo(); } };
    window.__mm_halo_state = () => {
      const ph = [...haloHost.querySelectorAll(".mm-phantom")];
      const slate = grid.querySelector(".mm-slate, .mm-graph");
      return { phantoms: ph.length, rays: haloHost.querySelectorAll(".mm-halo-rays line").length,
        haloZ: haloHost.querySelector(".mm-halo") && getComputedStyle(haloHost.querySelector(".mm-halo")).zIndex,
        slateZ: slate ? getComputedStyle(slate).zIndex : null,
        circular: ph[0] ? /50%/.test(ph[0].getAttribute("style")) : null,
        positions: ph.slice(0, 3).map(p => ({ left: p.style.left, top: p.style.top, label: p.textContent })) };
    };

    let editingId = null; // while a Milkdown edit is open, background re-renders are suppressed
    // the clicked field text, captured BEFORE the panel's click handler swaps in
    // the editor — so the Milkdown caret can land on the field the click fell on.
    let lastClickField = null;

    function render() {
      grid.innerHTML = "";
      const reg = store.registry();
      const ids = Object.keys(store.getState().concepts);
      for (const id of ids) {
        const cell = document.createElement("div");
        grid.appendChild(cell);
        const expanded = ui.expanded[id] || (ui.expanded[id] = new Set());
        const mode = ui.mode[id] || "panel";
        mount(cell, store.node(id), { registry: reg, expanded, mode }, {
          onToggle(path) { expanded.has(path) ? expanded.delete(path) : expanded.add(path); render();
                           gateway.send({ kind: "ui-node-fold", cardId: id, path, expanded: expanded.has(path), workspaceId: WSID }); },
          onTogglePanelGraph() { ui.mode[id] = mode === "panel" ? "graph" : "panel"; render(); },
          onEdit() { if (SLATE_EDITOR === "milkdown" && mountMilkdown) enterMilkdownEdit(cell, id); },
        });
      }
      document.getElementById("count").textContent = ids.length + " panels";
    }

    // §T / EDIT-01+02 — click-to-edit via Milkdown (opt-in). The whole card's §3
    // field text becomes an editable Milkdown surface (the "editable left side").
    // The unified tree-edit gesture model (reconciling EDIT-01/02): Enter / Tab /
    // Shift-Tab do native field-tree growth (sibling row / re-parent), BLUR
    // commits the full data through the lifecycle (PATCH → apply_update_lifecycle),
    // Esc discards. The store stays sole truth: the optimistic apply + the WS
    // concept_changed echo both re-render from `data`.
    async function enterMilkdownEdit(cell, id) {
      if (!mountMilkdown || editingId === id) return;
      editingId = id;
      const seed = linesToMarkdown(renderPanel(store.node(id), {})); // collapsed nested list, no glyphs
      cell.innerHTML = "";
      const host = document.createElement("div");
      host.className = "mm-edit-host";
      cell.appendChild(host);
      let done = false, slate = null;
      const finish = (commit) => {
        if (done) return; done = true; editingId = null;
        if (commit && slate) {
          const data = markdownToFieldText(slate.read());
          store.applyFrame({ type: "concept_changed", concept: { id, data } }); // optimistic
          gateway.send({ kind: "concept-update", cardId: id, data, workspaceId: WSID });
        }
        render();
      };
      // Esc discards — UNLESS the {-autocomplete popup is open (then Esc closes it).
      // Enter/Tab fall through to ProseMirror's list keymap (sibling / indent = §3
      // field growth). Commit is on blur (onCommit below).
      host.addEventListener("keydown", (ev) => {
        if (ev.key === "Escape" && !host.__acOpen) { ev.preventDefault(); ev.stopPropagation(); finish(false); }
      }, true);
      slate = await mountMilkdown(host, seed, { onCommit: () => finish(true) });
      const ed = host.querySelector(".mm-milkdown");
      if (ed) {
        ed.focus();
        // EDIT-01 caret-at-click: place the caret in the clicked field via
        // ProseMirror's selection API (a raw DOM Range is overridden on focus).
        let placed = false;
        try { placed = slate.placeCaretInField(lastClickField); } catch (e) { /* best-effort */ }
        if (!placed) {
          try { // fallback: caret at the doc end (always typable)
            const sel = window.getSelection(); const range = document.createRange();
            range.selectNodeContents(ed); range.collapse(false);
            sel.removeAllRanges(); sel.addRange(range);
          } catch (e) { /* best-effort */ }
        }
        // §3 {-autocomplete: typing `{` binds to an existing concept name (the
        // on-ramp to typed linking) — inserts `{<name>}` (EDIT-02).
        installAutocomplete(host, ed, [...store.registry().keys()].filter(Boolean));
      }
      window.__mm_editing = () => !!document.querySelector(".mm-edit-host .mm-milkdown");
      window.__mm_read_edit = () => (slate ? slate.read() : null);
      // the text of the block the caret currently sits in (caret-at-click probe)
      window.__mm_caret_line = () => {
        const a = window.getSelection().anchorNode; if (!a) return null;
        const b = (a.nodeType === 3 ? a.parentElement : a);
        const block = b && b.closest ? b.closest(".mm-milkdown p, .mm-milkdown li") : null;
        return block ? block.textContent : null;
      };
    }

    // installAutocomplete(host, ed, names) — when the caret sits just after an
    // unclosed `{`, pop a list of concept names; selecting one inserts `{<name>}`
    // (the §3 typed-linking on-ramp, EDIT-02). Uses contenteditable insertText/
    // delete (ProseMirror folds these into its doc via beforeinput).
    function installAutocomplete(host, ed, names) {
      let pop = null, items = [], sel = 0;
      const close = () => { if (pop) { pop.remove(); pop = null; items = []; } host.__acOpen = false; };
      const query = () => {
        const s = window.getSelection(); if (!s.rangeCount) return null;
        const node = s.anchorNode; if (!node || node.nodeType !== 3) return null;
        const m = /\{([^{}]*)$/.exec(node.textContent.slice(0, s.anchorOffset));
        return m ? m[1] : null;
      };
      const refresh = () => {
        const q = query();
        if (q == null) { close(); return; }
        items = names.filter((n) => n.toLowerCase().includes(q.toLowerCase())).slice(0, 8);
        if (!items.length) { close(); return; }
        sel = Math.min(sel, items.length - 1);
        if (!pop) { pop = document.createElement("div"); pop.className = "mm-autocomplete"; document.body.appendChild(pop); }
        host.__acOpen = true;
        const r = window.getSelection().getRangeAt(0).getBoundingClientRect();
        pop.style.left = r.left + "px"; pop.style.top = (r.bottom + 3) + "px";
        pop.innerHTML = "";
        items.forEach((n, i) => {
          const it = document.createElement("div");
          it.className = "mm-ac-item" + (i === sel ? " sel" : ""); it.textContent = n;
          it.addEventListener("mousedown", (ev) => { ev.preventDefault(); choose(n); });
          pop.appendChild(it);
        });
      };
      const choose = (name) => {
        const q = query(); if (q == null) { close(); return; }
        for (let i = 0; i < q.length; i++) document.execCommand("delete", false); // back to the `{`
        document.execCommand("insertText", false, name + "}");
        close();
      };
      ed.addEventListener("input", refresh);
      ed.addEventListener("keydown", (ev) => {
        if (!pop) return;
        if (ev.key === "ArrowDown") { ev.preventDefault(); ev.stopPropagation(); sel = (sel + 1) % items.length; refresh(); }
        else if (ev.key === "ArrowUp") { ev.preventDefault(); ev.stopPropagation(); sel = (sel - 1 + items.length) % items.length; refresh(); }
        else if (ev.key === "Enter") { ev.preventDefault(); ev.stopPropagation(); choose(items[sel]); }
        else if (ev.key === "Escape") { ev.preventDefault(); ev.stopPropagation(); close(); }
      }, true);
      // probe hooks
      window.__mm_ac_items = () => items.slice();
      window.__mm_ac_open = () => !!pop;
    }

    async function loadChunks() {
      try {
        const nodes = (await (await fetch(`/api/chunk_nodes?workspace_id=${WSID}`)).json()).nodes || [];
        const ids = nodes.filter(n => String(n.id).startsWith("c_") && n.id.slice(2).includes("_")).map(n => n.id);
        let n = 0;
        for (const id of ids) {
          if (n >= 24) break;
          let d; try { d = await (await fetch(`/api/chunk_details/${id}?workspace_id=${WSID}`)).json(); } catch { continue; }
          const ct = (d.content_tree || "").trim();
          if (ct.split("\n").length < 2) continue;
          store.applyFrame({ type: "concept_changed", concept: { id, content_tree: ct } });
          n++;
        }
      } catch (e) { console.warn("loadChunks", e); }
    }

    async function loadConcepts() {
      try {
        const cs = await (await fetch(`/api/concepts?workspace_id=${WSID}`)).json();
        for (const c of (cs.concepts || cs || [])) if (c && (c.id || c.concept_id)) store.applyFrame({ type: "concept_changed", concept: c });
      } catch (e) { /* concepts endpoint optional */ }
    }

    function connectWS() {
      try {
        const ws = new WebSocket(`ws://${location.host}/api/ws/workspace/${WSID}`);
        ws.onopen = () => { const e = document.getElementById("ws"); e.textContent = "ws ●"; e.className = "ws-on"; };
        ws.onclose = () => { const e = document.getElementById("ws"); e.textContent = "ws ○"; e.className = "ws-off"; };
        ws.onmessage = (ev) => {
          let f; try { f = JSON.parse(ev.data); } catch { return; }
          // UMAP-01 — the backend's canonical 6D layout (xyz + per-node HSV) lands
          // on the `umap_canonical` frame; feed it straight to the projector, which
          // RENDERS the HSV (the frontend never invents the colour field).
          // REAL-01 — also pass url_roots through so the ray-constrained force
          // step (computed from the backend's root_position/bounding_radius)
          // activates; the frontend never recomputes this placement (D10).
          if (f.type === "umap_canonical" && projector && f.coords) { projector.setNodes(f.coords, f.url_roots); return; }
          const before = JSON.stringify(store.getState().concepts);
          store.applyFrame(f);
          // fluid live update — but never clobber an open Milkdown edit surface
          if (JSON.stringify(store.getState().concepts) !== before && editingId == null) render();
        };
        window.__mm_ws = ws;
      } catch (e) { console.warn("ws", e); }
    }

    // auto-halo: clicking a COLLAPSED CIRCULAR node (§S.5) — or a panel field
    // (O.3) — radiates retrieval candidates from that focal. The halo stays
    // PROXIMAL to the focal (its live `getBoundingClientRect`), abstracting over
    // the folded semantic-space complexity the circular node represents.
    grid.addEventListener("click", (ev) => {
      if (ev.target.closest(".mm-drop")) return;
      const gnode = ev.target.closest(".mm-gnode"); // the §15.1 root-field-only collapsed node
      if (gnode) { openHalo(gnode); return; }
      const line = ev.target.closest(".mm-line");
      if (line) openHalo(line);
    });
    // capture the click point + clicked field text BEFORE the panel's bubble-phase
    // click handler runs enterMilkdownEdit (which replaces the slate) — so the
    // Milkdown caret can be placed at the clicked field (EDIT-01 caret-at-click).
    grid.addEventListener("mousedown", (ev) => {
      const t = ev.target.closest && ev.target.closest(".mm-text");
      lastClickField = t ? t.textContent : null;
    }, true);

    // ── 3D Real register (the projector behind the panels) ──────────────────
    let projector = null;
    async function bootProjector() {
      const canvas = document.getElementById("projector");
      try {
        for (let i = 0; i < 40 && !window.THREE; i++) await new Promise(r => setTimeout(r, 50));
        if (!window.THREE) { console.warn("THREE not loaded"); return; }
        projector = createProjector(canvas);
        const res = await (await fetch(`/api/recompute_umap?min_docs=8`, { method: "POST" })).json();
        const coords = res.coords || {};
        const n = projector.setNodes(coords, res.url_roots);
        const p = document.getElementById("proj"); p.textContent = `3d ● ${n}`; p.className = "ws-on";
        // couple the halo ray angle to the 3D camera azimuth (§V.4): orbiting
        // the scene rotates the halo rays "as traced between the sticked panel
        // and the retrieved nodes in 3D GUI". Throttled to camera change.
        let lastAz = null;
        projector.onFrame((az) => {
          if (!halo) return;
          if (lastAz === null || Math.abs(az - lastAz) > 0.01) { lastAz = az; halo.camAngle = az; renderHalo(); }
        });
        window.__mm_proj = projector;
        // UMAP-01 probes: inject a 6D umap_canonical frame + read a node's rendered
        // colour + orbit the camera azimuth (the render-level acceptance surface).
        window.__mm_proj_set = (coords) => projector.setNodes(coords);
        window.__mm_proj_color = (i) => projector.nodeColor(i || 0);
        // REAL-01 force-directed test hooks: inject a frame WITH url_roots
        // (so the ray-constrained collider step activates), and read back the
        // current animate-loop world positions (post force-step).
        window.__mm_proj_set_with_roots = (coords, urlRoots) => projector.setNodes(coords, urlRoots);
        window.__mm_proj_node_positions = () => projector.nodePositions();
        window.__mm_proj_orbit = (az) => {
          const r = Math.hypot(projector.camera.position.x, projector.camera.position.z) || 140;
          projector.camera.position.x = r * Math.sin(az);
          projector.camera.position.z = r * Math.cos(az);
          projector.camera.lookAt(0, 0, 0);
          projector.recolor();
          return projector.azimuth();
        };
      } catch (e) { console.warn("projector", e); }
    }

    (async () => {
      await loadConcepts();
      await loadChunks();
      render();
      connectWS();
      bootProjector();
      window.__mm_ready = true;
      window.__mm_slate_editor = SLATE_EDITOR;
      window.__mm_editing = () => !!document.querySelector(".mm-edit-host .mm-milkdown");
      // EDIT-03 — the slate holds NO authoritative state: re-deriving from the
      // store (what a dropped-WS reconnect does) re-renders identically.
      window.__mm_rerender = () => render();
      window.__mm_state = () => ({
        panels: grid.querySelectorAll(".mm-slate, .mm-graph").length,
        drops: grid.querySelectorAll(".mm-drop").length,
        gnodes: grid.querySelectorAll(".mm-gnode").length,
        wsState: document.getElementById("ws").textContent,
        proj3d: document.getElementById("proj").textContent,
        projNodes: projector ? projector.nodeCount() : 0,
        canvasWebGL: (() => { try { return !!document.getElementById("projector").getContext("webgl"); } catch { return false; } })(),
        first: (() => { const s = grid.querySelector(".mm-slate"); return s ? [...s.querySelectorAll(".mm-line")].slice(0,4).map(l=>l.textContent) : null; })(),
      });
    })();
  </script>
</body>
</html>
