<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>web_fiber_haptics — greenfield frontend (fe/)</title>
  <link rel="stylesheet" href="/static/css/fe.css?v={{ asset_version }}" />
  <script>
    window.onerror = function (msg, url, line) {
      const b = document.getElementById('fe-error') || document.createElement('div');
      b.id = 'fe-error';
      b.innerHTML += `<div>${msg} <small>${(url||'').split('/').pop()}:${line}</small></div>`;
      document.body.appendChild(b);
      return false;
    };
  </script>
</head>
<body>
  <!-- Real register: the 3D projector canvas (the only saturated pixels). -->
  <canvas id="fe-canvas"></canvas>

  <!-- Imaginary register: 2D concept editor + link layer, over the canvas. -->
  <svg id="fe-edges"></svg>
  <div id="fe-editor-layer"></div>
  <div id="fe-halo-layer"></div>
  <div id="fe-pin-layer"></div>

  <!-- Membrane: hover billboard. -->
  <div id="fe-billboard"></div>

  <!-- Toolbar (Symbolic chrome). -->
  <div id="fe-toolbar">
    <span id="fe-brand">web_fiber_haptics</span>
    <button id="fe-scan" title="Scan the live browser page">scan</button>
    <button id="fe-new-concept" title="Spawn a new concept card">+ concept</button>
    <button id="fe-recompute" title="Recompute the 3D UMAP layout">recompute umap</button>
    <button id="fe-frame" title="Frame the whole 3D cloud">frame</button>
    <span id="fe-status" data-state="boot">boot…</span>
  </div>

  <!-- Right sidebar: retrieval. -->
  <aside id="fe-sidebar">
    <h3>Chunk Retrieval</h3>
    <input id="fe-search" type="text" placeholder="Search chunk contents… (Enter)" spellcheck="false" />
    <div id="fe-results"><div class="fe-empty">Type a query and press Enter.</div></div>
  </aside>

  <!-- THREE r128 + OrbitControls (classic, set window.THREE) then the fe/ module. -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
  <script type="module" src="/static/fe/main.js?v={{ asset_version }}"></script>
</body>
</html>
