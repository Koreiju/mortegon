; mypy configuration — gradual type adoption.
;
; Strategy
; --------
; The codebase is large and predates static typing; flipping ``--strict``
; globally would flag thousands of pre-existing issues and drown the
; useful signal from new typed surfaces. Instead we keep the global
; defaults *permissive* (the project still type-checks at all) and
; tighten the screws **per module** as each surface is migrated to
; ``NewType`` ids and full annotations.
;
; To run locally:
;     pip install mypy
;     mypy backend
;
; Adoption cadence
; ----------------
; * When a module gains a ``from backend.services.ids import …`` line,
;   add a ``[mypy-backend.services.<module>]`` block below mirroring the
;   ``concept_lifecycle`` pattern.
; * When a module's signatures are fully annotated, set
;   ``disallow_untyped_defs = True`` on its block.
; * The end state is global ``strict = True`` and no per-module blocks.
;   Until then, per-module strictness is the unit of progress.

[mypy]
; Python version the project targets.
python_version = 3.13

; The repo has no top-level ``__init__.py`` — modules are addressed as
; ``backend.<sub>.<mod>`` via the absolute path on ``sys.path``. These
; two flags make mypy follow the same convention Python uses at runtime.
explicit_package_bases = True
namespace_packages = True
mypy_path = .

; Don't fail on third-party libs without stubs (kuzu, numpy ext shims,
; selenium, llama_cpp etc). Stubs land per-dependency as needed.
ignore_missing_imports = True

; Show error codes so per-line ``# type: ignore[code]`` suppressions
; are surgical, not blanket.
show_error_codes = True
pretty = True

; Files generated by the build / packaging tooling.
exclude = (?x)(
    ^backend_slow/      ; legacy snapshot, not in the active import graph
    | ^kuzu_db/         ; database files
    | ^snapshots/       ; scan artefacts
    | ^logs/
    | ^__pycache__/
    | ^test_packages/
    | ^scripts/diag_    ; one-off diagnostic scripts
  )

; --- Permissive defaults (legacy code is mostly unannotated) -----------
disallow_untyped_defs = False
disallow_incomplete_defs = False
check_untyped_defs = False
warn_return_any = False
warn_unused_ignores = True
no_implicit_optional = True

; Tests opt out of strict checking — they routinely monkeypatch and
; use loose ``Any`` shapes, and we'd rather not bury the assertions
; in type noise.
[mypy-backend.tests.*]
ignore_errors = True

; Legacy distiller modules predate type annotations and produce
; ~hundreds of pre-existing issues. Silence them globally for now so
; the *new* typed surfaces (ids, concept_lifecycle, pipeline) show
; clean signal. Drop these blocks once the modules are annotated.
[mypy-backend.dom.web_distiller_freq]
ignore_errors = True

[mypy-backend.dom.shadow_html_parser]
ignore_errors = True

[mypy-backend.dom.content_tagger]
ignore_errors = True

[mypy-backend.mapper.*]
ignore_errors = True

; --- NewType-bearing modules: hold the line ----------------------------
; The id types in ``services/ids`` are the whole point of running mypy
; in this codebase — they catch swapped-argument bugs (passing a
; ConceptId where a WorkspaceId is expected) at the type-check layer.
; Modules that import from ``ids`` must keep their typing honest so the
; NewType invariants aren't laundered through ``Any``.

[mypy-backend.services.ids]
disallow_untyped_defs = True
warn_return_any = True
strict_equality = True

[mypy-backend.services.concept_lifecycle]
; First module to adopt the NewType ids end-to-end. Holds the contract
; for downstream modules considering the migration.
check_untyped_defs = True
warn_return_any = True
strict_equality = True

; --- Functional core modules (pure, easy to type) ----------------------
; These have no I/O and no monkeypatching, so they should be cheap to
; keep fully typed.
[mypy-backend.services.settings]
check_untyped_defs = True
warn_return_any = True

; --- DOM pipeline helpers ----------------------------------------------
; The §5.4 flattener and chunk schemas are well-shaped dicts; type
; checking them protects the scanner → concept-node materialisation
; contract.
[mypy-backend.dom.pipeline]
check_untyped_defs = True
